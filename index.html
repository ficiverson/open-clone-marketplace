<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clone Marketplace</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --text: #1d1d1f; --muted: #6e6e73;
    --accent: #0071e3; --border: #e5e5ea; --chip: #f0f0f2; --shadow: 0 4px 24px rgba(0,0,0,.07);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #000; --surface: #1c1c1e; --text: #f5f5f7; --muted: #98989d;
            --accent: #0a84ff; --border: #2c2c2e; --chip: #2c2c2e; --shadow: 0 4px 24px rgba(0,0,0,.5); }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 0 20px; }

  /* Nav */
  nav { position: sticky; top: 0; z-index: 40; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        background: color-mix(in srgb, var(--bg) 75%, transparent); border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 980px; margin: 0 auto; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  .brand { font-weight: 700; font-size: 1.05rem; letter-spacing: -.01em; }
  .search { flex: 1; max-width: 340px; margin-left: auto; }
  .search input { width: 100%; padding: 7px 14px; border-radius: 10px; border: none; background: var(--chip);
                  color: var(--text); font-size: .9rem; outline: none; }
  .lang-toggle { display: flex; gap: 2px; background: var(--chip); border-radius: 8px; padding: 2px; }
  .lang-toggle button { border: none; background: none; color: var(--muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: .82rem; font-weight: 600; }
  .lang-toggle button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.12); }

  /* Hero */
  .hero { margin: 28px 0 8px; }
  .hero-label { font-size: .78rem; font-weight: 700; letter-spacing: .06em; color: var(--accent); text-transform: uppercase; }
  .hero-card { margin-top: 8px; border-radius: 20px; overflow: hidden; background: linear-gradient(135deg, #0a84ff, #5e5ce6 60%, #bf5af2);
               color: #fff; padding: 34px 30px; display: flex; align-items: center; gap: 26px; cursor: pointer; box-shadow: var(--shadow); }
  .hero-card img { width: 92px; height: 92px; border-radius: 22px; box-shadow: 0 8px 20px rgba(0,0,0,.25); background: #fff2; }
  .hero-card h2 { font-size: 1.7rem; letter-spacing: -.02em; }
  .hero-card p { opacity: .85; margin-top: 6px; max-width: 460px; line-height: 1.45; }
  .hero-card .get { margin-left: auto; }

  /* Category chips */
  .cats { display: flex; gap: 8px; margin: 26px 0 4px; flex-wrap: wrap; }
  .cat { border: none; background: var(--chip); color: var(--text); padding: 7px 16px; border-radius: 999px; font-size: .85rem; cursor: pointer; font-weight: 500; }
  .cat.active { background: var(--accent); color: #fff; }

  /* Section */
  .section-title { font-size: 1.35rem; font-weight: 700; letter-spacing: -.02em; margin: 26px 0 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; padding-bottom: 20px; }
  .app-row { background: var(--surface); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px;
             cursor: pointer; box-shadow: var(--shadow); transition: transform .15s ease; }
  .app-row:hover { transform: translateY(-2px); }
  .app-row img, .app-icon-ph { width: 62px; height: 62px; border-radius: 14px; flex-shrink: 0; object-fit: cover; }
  .app-icon-ph { background: linear-gradient(135deg, var(--accent), #5e5ce6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; font-weight: 700; }
  .app-row .info { flex: 1; min-width: 0; }
  .app-row h3 { font-size: 1rem; letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app-row .sub { color: var(--muted); font-size: .82rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .get { border: none; background: var(--chip); color: var(--accent); font-weight: 700; font-size: .82rem;
         padding: 7px 18px; border-radius: 999px; cursor: pointer; flex-shrink: 0; }
  .get.primary { background: #fff; color: #0071e3; }
  .free-note { display: block; font-size: .62rem; color: var(--muted); text-align: center; margin-top: 3px; font-weight: 400; }

  /* Detail sheet */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 4vh 16px; }
  .overlay.open { display: flex; }
  .sheet { background: var(--surface); border-radius: 20px; max-width: 760px; width: 100%; margin-bottom: 6vh; box-shadow: 0 24px 60px rgba(0,0,0,.35); overflow: hidden; }
  .sheet-head { display: flex; gap: 18px; padding: 28px 28px 20px; align-items: center; }
  .sheet-head img, .sheet-head .app-icon-ph { width: 100px; height: 100px; border-radius: 24px; }
  .sheet-head .app-icon-ph { font-size: 2.4rem; }
  .sheet-head h2 { font-size: 1.5rem; letter-spacing: -.02em; }
  .sheet-head .tag { color: var(--muted); margin-top: 3px; font-size: .95rem; }
  .sheet-head .actions { margin-left: auto; text-align: center; }
  .close { position: fixed; top: 14px; right: max(16px, calc(50vw - 380px)); background: var(--chip); border: none; width: 32px; height: 32px; border-radius: 50%; color: var(--muted); font-size: 1rem; cursor: pointer; z-index: 51; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  .stats { display: flex; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 0 28px; padding: 14px 0; }
  .stat { flex: 1; text-align: center; border-right: 1px solid var(--border); padding: 0 8px; }
  .stat:last-child { border-right: none; }
  .stat .k { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .stat .v { font-size: 1.02rem; font-weight: 600; margin-top: 3px; }
  .stat .u { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .shots { display: flex; gap: 12px; overflow-x: auto; padding: 20px 28px 6px; scroll-snap-type: x mandatory; }
  .shots img { height: 380px; border-radius: 14px; scroll-snap-align: start; border: 1px solid var(--border); }
  .sheet-body { padding: 20px 28px 28px; }
  .sheet-body h4 { font-size: 1.05rem; margin: 20px 0 8px; }
  .sheet-body p { color: var(--text); line-height: 1.55; font-size: .95rem; }
  .need { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; margin-top: 10px; }
  .need div { background: var(--chip); border-radius: 10px; padding: 10px 12px; font-size: .85rem; }
  .need .nk { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; }
  .infogrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; margin-top: 8px; }
  .infogrid .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .88rem; }
  .infogrid .item span:first-child { color: var(--muted); }
  .deploy-note { background: var(--chip); border-radius: 12px; padding: 14px 16px; margin-top: 20px; font-size: .88rem; line-height: 1.5; color: var(--muted); }

  /* Skill banner */
  .skill-banner { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border);
                  border-radius: 14px; padding: 14px 18px; margin: 22px 0 6px; box-shadow: var(--shadow); flex-wrap: wrap; }
  .skill-banner .ico { font-size: 1.4rem; }
  .skill-banner p { flex: 1; font-size: .88rem; color: var(--muted); line-height: 1.45; min-width: 200px; }
  .skill-banner a.dl { background: var(--accent); color: #fff; font-weight: 600; font-size: .85rem; padding: 9px 18px; border-radius: 999px; flex-shrink: 0; }
  .skill-banner .dismiss { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 4px 8px; flex-shrink: 0; }
  .skill-banner[hidden] { display: none; }

  /* Guide link cards */
  .guide-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin: 30px 0 40px; }
  .guide-card { background: var(--surface); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); display: flex; gap: 14px; align-items: flex-start; color: var(--text); transition: transform .15s ease; }
  .guide-card:hover { transform: translateY(-2px); }
  .guide-card .gi { font-size: 1.6rem; }
  .guide-card h3 { font-size: 1.02rem; margin-bottom: 4px; }
  .guide-card p { color: var(--muted); font-size: .87rem; line-height: 1.5; }
  .guide-card .arrow { margin-left: auto; color: var(--accent); font-weight: 700; align-self: center; }

  /* Guide pages */
  .page { padding: 26px 0 50px; max-width: 720px; }
  .page .back { display: inline-block; margin-bottom: 18px; font-weight: 600; font-size: .92rem; }
  .page h1 { font-size: 1.7rem; letter-spacing: -.02em; margin-bottom: 8px; }
  .page .lead { color: var(--muted); line-height: 1.6; margin-bottom: 26px; }
  .step { display: flex; gap: 16px; margin-bottom: 22px; }
  .step .num { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .95rem; }
  .step h3 { font-size: 1.05rem; margin-bottom: 4px; }
  .step p { color: var(--muted); line-height: 1.6; font-size: .93rem; }
  .step .btn-inline { display: inline-block; margin-top: 8px; background: var(--accent); color: #fff; font-weight: 600; font-size: .85rem; padding: 8px 18px; border-radius: 999px; }
  .callout { background: var(--surface); border-radius: 14px; padding: 16px 18px; margin: 26px 0; box-shadow: var(--shadow); font-size: .9rem; color: var(--muted); line-height: 1.6; }
  .callout strong { color: var(--text); }

  /* Onboarding */
  .ob-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 60; display: none; align-items: center; justify-content: center; padding: 20px; }
  .ob-overlay.open { display: flex; }
  .ob { background: var(--surface); border-radius: 22px; max-width: 440px; width: 100%; padding: 34px 30px 24px; box-shadow: 0 24px 60px rgba(0,0,0,.35); text-align: center; }
  .ob .ob-ico { font-size: 2.6rem; }
  .ob h2 { font-size: 1.3rem; letter-spacing: -.01em; margin: 14px 0 10px; }
  .ob p { color: var(--muted); line-height: 1.6; font-size: .93rem; min-height: 88px; }
  .ob .dots { display: flex; gap: 6px; justify-content: center; margin: 18px 0; }
  .ob .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--chip); }
  .ob .dot.on { background: var(--accent); }
  .ob .ob-actions { display: flex; gap: 10px; }
  .ob .ob-actions button { flex: 1; border: none; border-radius: 12px; padding: 12px; font-size: .92rem; font-weight: 600; cursor: pointer; }
  .ob .ob-next { background: var(--accent); color: #fff; }
  .ob .ob-prev { background: var(--chip); color: var(--text); }
  .ob .ob-skip { background: none; border: none; color: var(--muted); font-size: .82rem; margin-top: 12px; cursor: pointer; }
  .help-btn { border: none; background: var(--chip); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; font-weight: 700; cursor: pointer; flex-shrink: 0; }
  code { background: var(--chip); padding: 2px 6px; border-radius: 5px; font-size: .85em; }
  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 26px 20px 40px; line-height: 1.6; }
  .loading, .empty { color: var(--muted); padding: 60px 0; text-align: center; grid-column: 1/-1; }
  @media (max-width: 640px) {
    .hero-card { flex-direction: column; text-align: center; padding: 26px 20px; }
    .hero-card .get { margin: 0 auto; }
    .infogrid { grid-template-columns: 1fr; }
    .search { display: none; }

    /* Full-screen sheet, like the iOS App Store */
    .overlay { padding: 0; }
    .sheet { border-radius: 0; margin-bottom: 0; min-height: 100dvh; }
    .close { top: 12px; right: 12px; }
    .sheet-head { flex-wrap: wrap; padding: 20px 16px 14px; gap: 14px; padding-top: max(20px, env(safe-area-inset-top)); }
    .sheet-head img, .sheet-head .app-icon-ph { width: 76px; height: 76px; border-radius: 18px; }
    .sheet-head h2 { font-size: 1.25rem; }
    .sheet-head > div:nth-child(2) { flex: 1; min-width: 0; }
    /* GET moves to its own row under the title, aligned with the text column */
    .sheet-head .actions { flex-basis: 100%; margin: -6px 0 0 90px; text-align: left; }
    .sheet-head .actions .free-note { display: inline-block; margin: 0 0 0 10px; vertical-align: middle; }

    /* Stats become a horizontal scroller instead of squeezing 5 columns */
    .stats { margin: 0 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .stats::-webkit-scrollbar { display: none; }
    .stat { min-width: 96px; flex: 0 0 auto; }

    .shots { padding: 16px 16px 4px; }
    .shots img { height: 300px; }
    .sheet-body { padding: 16px 16px calc(28px + env(safe-area-inset-bottom)); }
    .skill-banner { position: relative; padding: 12px 14px; }
    .skill-banner .dismiss { position: absolute; top: 6px; right: 6px; margin: 0; }
    .skill-banner p { padding-right: 18px; }
    .strip { padding: 18px 16px; }
    .wrap { padding: 0 14px; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <span class="brand">Clone Marketplace</span>
    <div class="search"><input id="q" type="search" oninput="render()" data-i18n-ph="search"></div>
    <button class="help-btn" onclick="startOnboarding()" title="Tutorial">?</button>
    <div class="lang-toggle">
      <button id="btn-es" onclick="setLang('es')">ES</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<div class="wrap">
<div id="catalogView">
  <section class="hero" id="hero" hidden>
    <div class="hero-label" data-i18n="featured"></div>
    <div class="hero-card" id="heroCard"></div>
  </section>

  <div class="skill-banner" id="skillBanner">
    <span class="ico">🧩</span>
    <p data-i18n="skillBanner"></p>
    <a class="dl" href="skill/clone-deployer.skill" data-i18n="skillBtn" onclick="dismissBanner()"></a>
    <button class="dismiss" onclick="dismissBanner()" aria-label="Close" title="Cerrar / Close">✕</button>
  </div>

  <div class="cats" id="cats"></div>

  <h2 class="section-title" data-i18n="allApps"></h2>
  <div class="grid" id="apps"><div class="loading" data-i18n="loading"></div></div>

  <div class="guide-cards">
    <a class="guide-card" href="#deploy">
      <span class="gi">📲</span>
      <div><h3 data-i18n="guideDeployTitle"></h3><p data-i18n="guideDeployDesc"></p></div>
      <span class="arrow">›</span>
    </a>
    <a class="guide-card" href="#publish">
      <span class="gi">🚀</span>
      <div><h3 data-i18n="guidePublishTitle"></h3><p data-i18n="guidePublishDesc"></p></div>
      <span class="arrow">›</span>
    </a>
  </div>
</div>
<div id="pageView" hidden></div>
</div>

<div class="ob-overlay" id="obOverlay">
  <div class="ob" id="obBox"></div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <button class="close" onclick="closeSheet()">✕</button>
  <div class="sheet" id="sheet"></div>
</div>

<footer>
  <span data-i18n="footer"></span><br>
  <a href="#deploy" data-i18n="guideDeployTitle"></a> ·
  <a href="#publish" data-i18n="guidePublishTitle"></a> ·
  <a href="javascript:startOnboarding()" data-i18n="tutorial"></a> ·
  <a href="https://github.com/ficiverson/open-clone-marketplace" data-i18n="contribute"></a>
</footer>

<script>
const I18N = {
  es: {
    search: "Buscar apps",
    featured: "Destacada",
    allApps: "Todas las apps",
    loading: "Cargando catálogo…",
    empty: "No hay apps que coincidan.",
    all: "Todas",
    get: "OBTENER", free: "Gratis · tu instancia",
    promptPrefix: "Despliega esta app en mi propia cuenta usando la skill clone-deployer: ",
    skillBanner: "¿Primera vez? Instala la skill <strong>clone-deployer</strong> en Claude (solo una vez): descárgala y arrástrala al chat o añádela en Ajustes → Capacidades. Después, el botón OBTENER abre Claude con todo listo.",
    skillBtn: "Descargar skill",
    deploy: "Desplegar con Claude", viewRepo: "Ver código", issues: "Soporte",
    cloneOf: "clon de", by: "por",
    catNames: { finance: "Finanzas", productivity: "Productividad", social: "Social", media: "Media", communication: "Comunicación", health: "Salud", other: "Otras" },
    stDev: "Autor", stCat: "Categoría", stLic: "Licencia", stTime: "Despliegue", stPlat: "Plataformas", min: "min",
    screenshots: "Capturas",
    about: "Descripción",
    need: "Qué necesitas",
    needTools: "Herramienta", needAccount: "Cuenta",
    info: "Información",
    infoRows: { version: "Versión", published: "Publicada", updated: "Actualizada", backend: "Backend", auth: "Login", repo: "Repositorio", license: "Licencia", demo: "Demo", demoTry: "Probar" },
    deployNote: "El botón OBTENER abre Claude con el prompt listo. Requiere tener instalada la skill <a href='skill/clone-deployer.skill'>clone-deployer</a> (una sola vez, sirve para todas las apps). Tendrás tu propia instancia con tus datos.",
    guideDeployTitle: "Consigue tu propia app",
    guideDeployDesc: "Guía paso a paso para desplegar cualquier app del catálogo sin saber programar.",
    guidePublishTitle: "Publica tu app clónica",
    guidePublishDesc: "Cómo generar el manifest de tu repo y aparecer en el catálogo.",
    back: "‹ Volver al catálogo",
    tutorial: "Ver tutorial",
    obSkip: "Saltar", obNext: "Siguiente", obPrev: "Anterior", obDone: "Explorar el catálogo",
    obSlides: [
      { i: "🛍️", t: "Bienvenido a Clone Marketplace", b: "Un catálogo de apps clónicas open source (tipo Splitwise, Trello…) que despliegas en <strong>tu propia cuenta</strong>. Nada de suscripciones ni servidores de terceros: la app es tuya, los datos son tuyos y el coste es cero en los planes gratuitos." },
      { i: "🧩", t: "Todo funciona con skills de Claude", b: "Una <strong>skill</strong> es un archivo que le enseña a Claude un procedimiento. Aquí hay dos: <strong>clone-deployer</strong> (despliega cualquier app del catálogo) y <strong>clonefest-generator</strong> (prepara tu app para publicarla). Se instalan una sola vez arrastrándolas a Claude." },
      { i: "📲", t: "Conseguir una app", b: "Instala la skill clone-deployer, pulsa <strong>OBTENER</strong> en cualquier app y se abrirá Claude con todo listo. Te guiará paso a paso (~30 min la primera vez) hasta que tu app esté online. Sin saber programar." },
      { i: "🚀", t: "¿Tienes una app clónica?", b: "Publícala: la skill clonefest-generator inspecciona tu repositorio y genera su manifest. Abres un PR, lo revisamos y tu app aparece en el catálogo para que cualquiera la despliegue. Consulta las guías 📲 y 🚀 al final de la página cuando las necesites." }
    ],
    pages: {
      deploy: `
        <a class="back" href="#">‹ Volver al catálogo</a>
        <h1>Consigue tu propia app 📲</h1>
        <p class="lead">Cada app del catálogo se despliega en tu propia cuenta (Firebase, Supabase…): tu instancia, tus datos, gratis en los planes free. No necesitas saber programar — Claude hace el trabajo técnico y tú decides.</p>
        <div class="step"><div class="num">1</div><div><h3>Instala la skill clone-deployer (solo una vez)</h3><p>Una skill es un archivo que le enseña a Claude un procedimiento. Descárgala y arrástrala a un chat de Claude, o añádela en Ajustes → Capacidades. Sirve para todas las apps del catálogo.</p><a class="btn-inline" href="skill/clone-deployer.skill">Descargar clone-deployer</a></div></div>
        <div class="step"><div class="num">2</div><div><h3>Elige una app y pulsa OBTENER</h3><p>El botón abre Claude (app de escritorio si la tienes, web si no) con el prompt ya escrito. Alternativa manual: copia el enlace del repositorio y pídele a Claude «despliega esta app: &lt;enlace&gt;».</p></div></div>
        <div class="step"><div class="num">3</div><div><h3>Sigue los pasos con Claude</h3><p>Claude lee el manifest de la app, comprueba qué herramientas te faltan y te va guiando: te pedirá crear una cuenta gratuita del backend (p. ej. Firebase) y hacer un par de clics en su consola; los comandos los ejecuta él. La primera vez tardarás ~30 minutos.</p></div></div>
        <div class="step"><div class="num">4</div><div><h3>Comprueba y disfruta</h3><p>Al final tendrás una URL propia (p. ej. tu-app.web.app) para ti y tu gente. Para actualizarla más adelante, pídele a Claude «actualiza mi app».</p></div></div>
        <div class="callout"><strong>Seguridad:</strong> los manifests del catálogo se revisan antes de publicarse y todo el código es open source. Aun así, nunca compartas contraseñas en el chat: cuando haga falta iniciar sesión, Claude te pedirá que lo hagas tú en tu navegador.</div>`,
      publish: `
        <a class="back" href="#">‹ Volver al catálogo</a>
        <h1>Publica tu app clónica 🚀</h1>
        <p class="lead">Requisitos: repo público en GitHub con licencia OSI (MIT, Apache-2.0, GPL…), README con instrucciones de despliegue, y despliegue autocontenido — cada usuario usa su propio backend, nunca el tuyo (sin API keys ni project IDs tuyos en el repo).</p>

        <div class="callout"><strong>Marcas:</strong> tu app es un proyecto independiente «inspirado en» el original. Usa tu propio nombre e icono, nunca los del original. Detalles en la <a href="https://github.com/ficiverson/open-clone-marketplace/blob/main/CONTRIBUTING.md">guía de contribución</a>.</div>`

    footer: "Clone Marketplace — apps clónicas autoalojadas. Proyectos independientes sin afiliación con las apps originales.",
    contribute: "GitHub ↗"
  },

    guidePublishTitle: "Publish your clone app",
    guidePublishDesc: "How to generate your repo's manifest and get listed in the catalog.",
    back: "‹ Back to catalog",
    tutorial: "View tutorial",
    obSkip: "Skip", obNext: "Next", obPrev: "Back", obDone: "Explore the catalog",
    obSlides: [
      { i: "🛍️", t: "Welcome to Clone Marketplace", b: "A catalog of open-source clone apps (Splitwise-style, Trello-style…) that you deploy on <strong>your own account</strong>. No subscriptions, no third-party servers: the app is yours, the data is yours, and free tiers cost nothing." },
      { i: "🧩", t: "Everything runs on Claude skills", b: "A <strong>skill</strong> is a file that teaches Claude a procedure. There are two here: <strong>clone-deployer</strong> (deploys any catalog app) and <strong>clonefest-generator</strong> (prepares your app for publishing). Install them once by dragging them into Claude." },
      { i: "📲", t: "Getting an app", b: "Install the clone-deployer skill, hit <strong>GET</strong> on any app and Claude opens ready to go. It walks you through every step (~30 min the first time) until your app is live. No coding needed." },
      { i: "🚀", t: "Built a clone app?", b: "Publish it: the clonefest-generator skill inspects your repository and generates its manifest. Open a PR, we review it, and your app joins the catalog for anyone to deploy. Check the 📲 and 🚀 guides at the bottom of the page whenever you need them." }
    ],
    pages: {

        <div class="step"><div class="num">1</div><div><h3>Install the clone-deployer skill (once)</h3><p>A skill is a file that teaches Claude a procedure. Download it and drag it into a Claude chat, or add it in Settings → Capabilities. It works for every app in the catalog.</p><a class="btn-inline" href="skill/clone-deployer.skill">Download clone-deployer</a></div></div>

        <div class="callout"><strong>Security:</strong> catalog manifests are reviewed before listing and all code is open source. Still, never share passwords in the chat: when a login is needed, Claude will ask you to do it yourself in your browser.</div>`,

        <div class="step"><div class="num">1</div><div><h3>Generate the manifest with the skill</h3><p>Install clonefest-generator in Claude and ask "generate the clonefest for my repo". It inspects your code (stack, owner, dates, README steps) and writes a validated <code>clonefest.json</code>. You can also fill the <a href="https://github.com/ficiverson/open-clone-marketplace/blob/main/clonefest.template.json">template</a> by hand.</p><a class="btn-inline" href="skill/clonefest-generator.skill">Download clonefest-generator</a></div></div>
        <div class="step"><div class="num">2</div><div><h3>Commit the manifest</h3><p><code>clonefest.json</code> goes at the root of your repository, on the default branch.</p></div></div>

        <div class="step"><div class="num">4</div><div><h3>Review and go live</h3><p>We hand-review the deploy steps (they run on users' machines) and your app joins the catalog with its sheet, screenshots and GET button.</p></div></div>

let lang = localStorage.getItem("lang") || (navigator.language.startsWith("es") ? "es" : "en");
let manifests = [];
let activeCat = "all";

const t = k => I18N[lang][k];
const loc = o => o ? (o[lang] || o.en || "") : "";
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const rawBase = url => url.replace(/\/[^/]*$/, "/");
const claudeQ = m => encodeURIComponent(t("promptPrefix") + m.repo);
const claudeUrl = m => "https://claude.ai/new?q=" + claudeQ(m);

function openClaude(e, id) {
  e.preventDefault(); e.stopPropagation();
  const m = manifests.find(x => x.id === id);
  if (!m) return;
  // Try the desktop app first; fall back to the web if it doesn't take focus.
  const fallback = setTimeout(() => window.open(claudeUrl(m), "_blank", "noopener"), 1500);
  const cancel = () => { clearTimeout(fallback); window.removeEventListener("blur", cancel); document.removeEventListener("visibilitychange", onVis); };
  const onVis = () => { if (document.hidden) cancel(); };
  window.addEventListener("blur", cancel);
  document.addEventListener("visibilitychange", onVis);
  location.href = "claude://claude.ai/new?q=" + claudeQ(m);
}

function dismissBanner() {
  localStorage.setItem("skillBannerDismissed", "1");
  document.getElementById("skillBanner").hidden = true;
}
if (localStorage.getItem("skillBannerDismissed")) document.getElementById("skillBanner").hidden = true;
const iconUrl = m => m.icon ? rawBase(m._url) + m.icon : null;
const shotUrls = m => (m.screenshots || []).map(s => /^https?:/.test(s) ? s : rawBase(m._url) + s);

function iconHtml(m, cls) {
  const u = iconUrl(m);
  return u ? `<img class="${cls||''}" src="${esc(u)}" alt="" onerror="this.outerHTML='<div class=&quot;app-icon-ph&quot;>${esc(m.name[0])}</div>'">`
           : `<div class="app-icon-ph">${esc(m.name[0])}</div>`;
}

function setLang(l) {
  lang = l; localStorage.setItem("lang", l);
  document.documentElement.lang = l;
  document.getElementById("btn-es").classList.toggle("active", l === "es");
  document.getElementById("btn-en").classList.toggle("active", l === "en");
  document.querySelectorAll("[data-i18n]").forEach(el => { el.innerHTML = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => { el.placeholder = t(el.dataset.i18nPh); });
  renderCats(); render(); renderHero();
  const pg = currentPage();
  if (pg) renderPage(pg);
  if (document.getElementById("obOverlay").classList.contains("open")) renderOnboard();
}

/* ── Guide pages (#deploy / #publish) ── */
const currentPage = () => location.hash === "#deploy" ? "deploy" : location.hash === "#publish" ? "publish" : null;

function renderPage(kind) {
  const el = document.getElementById("pageView");
  el.innerHTML = `<div class="page">${I18N[lang].pages[kind]}</div>`;
}

function route() {
  const pg = currentPage();
  document.getElementById("catalogView").hidden = !!pg;
  document.getElementById("pageView").hidden = !pg;
  if (pg) { closeSheet(true); renderPage(pg); window.scrollTo(0, 0); }
  else {
    const id = hashApp();
    if (id) openSheet(id, true); else closeSheet(true);
  }
}
window.addEventListener("hashchange", route);

/* ── Onboarding (first visit) ── */
let obStep = 0;
function renderOnboard() {
  const s = I18N[lang].obSlides, cur = s[obStep], last = obStep === s.length - 1;
  document.getElementById("obBox").innerHTML = `
    <div class="ob-ico">${cur.i}</div>
    <h2>${cur.t}</h2>
    <p>${cur.b}</p>
    <div class="dots">${s.map((_, j) => `<span class="dot ${j === obStep ? "on" : ""}"></span>`).join("")}</div>
    <div class="ob-actions">
      ${obStep > 0 ? `<button class="ob-prev" onclick="obMove(-1)">${t("obPrev")}</button>` : ""}
      <button class="ob-next" onclick="${last ? "endOnboarding()" : "obMove(1)"}">${last ? t("obDone") : t("obNext")}</button>
    </div>
    ${last ? "" : `<button class="ob-skip" onclick="endOnboarding()">${t("obSkip")}</button>`}`;
}
function obMove(d) { obStep = Math.max(0, Math.min(I18N[lang].obSlides.length - 1, obStep + d)); renderOnboard(); }
function startOnboarding() {
  obStep = 0; renderOnboard();
  document.getElementById("obOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function endOnboarding() {
  localStorage.setItem("onboardingDone", "1");
  document.getElementById("obOverlay").classList.remove("open");
  document.body.style.overflow = "";
}
if (!localStorage.getItem("onboardingDone")) setTimeout(startOnboarding, 400);

function renderCats() {
  const cats = [...new Set(manifests.map(m => m.category || "other"))];
  const el = document.getElementById("cats");
  if (cats.length < 2) { el.innerHTML = ""; return; }
  el.innerHTML = [`<button class="cat ${activeCat==='all'?'active':''}" onclick="setCat('all')">${t("all")}</button>`,
    ...cats.map(c => `<button class="cat ${activeCat===c?'active':''}" onclick="setCat('${esc(c)}')">${t("catNames")[c] || c}</button>`)].join("");
}
function setCat(c) { activeCat = c; renderCats(); render(); }

function renderHero() {
  const m = manifests[0];
  if (!m) return;
  document.getElementById("hero").hidden = false;
  document.getElementById("heroCard").innerHTML = `
    ${iconHtml(m)}
    <div>
      <h2>${esc(m.name)}</h2>
      <p>${esc(loc(m.tagline) || loc(m.description))}</p>
    </div>
    <div class="get-wrap get" style="background:none;padding:0">
      <a class="get primary" style="display:inline-block" href="${claudeUrl(m)}" onclick="openClaude(event,'${esc(m.id)}')">${t("get")}</a>
      <span class="free-note" style="color:#fffc">${t("free")}</span>
    </div>`;
  document.getElementById("heroCard").onclick = () => openSheet(m.id);
}

function render() {
  const q = (document.getElementById("q").value || "").toLowerCase();
  const el = document.getElementById("apps");
  if (!manifests.length) return;
  const list = manifests.filter(m => {
    if (activeCat !== "all" && (m.category || "other") !== activeCat) return false;
    if (!q) return true;
    const hay = [
      m.name, m.clone_of, m.category, loc(m.tagline), loc(m.description),
      m.owner?.github, m.owner?.name,
      m.stack?.frontend?.framework, m.stack?.backend?.provider,
      ...(m.platforms || [])
    ].filter(Boolean).join(" ").toLowerCase();
    return q.split(/\s+/).every(term => hay.includes(term));
  });
  el.innerHTML = list.length ? list.map(m => `
    <div class="app-row" onclick="openSheet('${esc(m.id)}')">
      ${iconHtml(m)}
      <div class="info">
        <h3>${esc(m.name)}</h3>
        <div class="sub">${t("cloneOf")} ${esc(m.clone_of)}</div>
        <div class="sub">${esc(loc(m.tagline))}</div>
      </div>
      <div>
        <a class="get" style="display:inline-block" href="${claudeUrl(m)}" onclick="openClaude(event,'${esc(m.id)}')">${t("get")}</a>
        <span class="free-note">${t("free")}</span>
      </div>
    </div>`).join("") : `<div class="empty">${t("empty")}</div>`;
}

const hashApp = () => location.hash.startsWith("#app/") ? decodeURIComponent(location.hash.slice(5)) : null;

function openSheet(id, fromHistory) {
  const m = manifests.find(x => x.id === id);
  if (!m) return;
  if (!fromHistory && hashApp() !== id) history.pushState({ app: id }, "", "#app/" + encodeURIComponent(id));
  const shots = shotUrls(m);
  const tools = m.requirements?.tools || [];
  const accounts = m.requirements?.accounts || [];
  const ir = t("infoRows");
  const info = [
    [ir.version, m.version], [ir.published, m.published_at], [ir.updated, m.updated_at],
    [ir.backend, m.stack?.backend?.provider], [ir.auth, (m.stack?.backend?.auth_providers || []).join(", ")],
    [ir.license, m.license],
    [ir.repo, `<a href="${esc(m.repo)}" target="_blank" rel="noopener">GitHub ↗</a>`],
    m.demo ? [ir.demo, `<a href="${esc(m.demo)}" target="_blank" rel="noopener">${ir.demoTry} ↗</a>`] : null
  ].filter(r => r && r[1]);
  document.getElementById("sheet").innerHTML = `
    <div class="sheet-head">
      ${iconHtml(m)}
      <div>
        <h2>${esc(m.name)}</h2>
        <div class="tag">${esc(loc(m.tagline) || (t("cloneOf") + " " + m.clone_of))}</div>
        <div class="tag">${t("by")} <a href="https://github.com/${esc(m.owner?.github)}" target="_blank" rel="noopener">@${esc(m.owner?.github)}</a></div>
      </div>
      <div class="actions">
        <a class="get" style="display:inline-block" href="${claudeUrl(m)}" onclick="openClaude(event,'${esc(m.id)}')">${t("get")}</a>
        <span class="free-note">${t("free")}</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">${t("stDev")}</div><div class="v">@${esc(m.owner?.github)}</div></div>
      <div class="stat"><div class="k">${t("stCat")}</div><div class="v">${t("catNames")[m.category] || esc(m.category || "—")}</div></div>
      <div class="stat"><div class="k">${t("stLic")}</div><div class="v">${esc(m.license)}</div></div>
      ${m.deploy?.estimated_minutes ? `<div class="stat"><div class="k">${t("stTime")}</div><div class="v">~${m.deploy.estimated_minutes}</div><div class="u">${t("min")}</div></div>` : ""}
      <div class="stat"><div class="k">${t("stPlat")}</div><div class="v">${(m.platforms || []).length}</div><div class="u">${esc((m.platforms || []).join(" · "))}</div></div>
    </div>
    ${shots.length ? `<div class="shots">${shots.map(s => `<img src="${esc(s)}" alt="screenshot" loading="lazy">`).join("")}</div>` : ""}
    <div class="sheet-body">
      <h4>${t("about")}</h4>
      <p>${esc(loc(m.description))}</p>
      <h4>${t("need")}</h4>
      <div class="need">
        ${accounts.map(a => `<div><div class="nk">${t("needAccount")}${a.cost ? " · " + esc(a.cost) : ""}</div>${a.url ? `<a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.name)}</a>` : esc(a.name)}</div>`).join("")}
        ${tools.map(x => `<div><div class="nk">${t("needTools")}${x.min_version ? " · ≥" + esc(x.min_version) : ""}</div>${esc(x.name)}</div>`).join("")}
      </div>
      <h4>${t("info")}</h4>
      <div class="infogrid">${info.map(r => `<div class="item"><span>${r[0]}</span><span>${r[1]}</span></div>`).join("")}</div>
      <div class="deploy-note">${t("deployNote")}</div>
    </div>`;
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeSheet(fromHistory) {
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
  if (!fromHistory && hashApp()) history.pushState(null, "", location.pathname + location.search);
}
document.addEventListener("keydown", e => { if (e.key === "Escape") { closeSheet(); endOnboarding(); } });
window.addEventListener("popstate", () => route());

async function load() {
  try {
    const idx = await (await fetch("apps.json")).json();
    manifests = (await Promise.all(idx.apps.map(async a => {
      // Same-origin cache first (refreshed by CI); raw GitHub as fallback.
      let m = null;
      for (const url of [`cache/${a.id}.json`, a.manifest]) {
        try { const r = await fetch(url); if (r.ok) { m = await r.json(); break; } } catch {}
      }
      if (m) m._url = a.manifest; // icons/screenshots resolve against the app repo
      return m;
    }))).filter(Boolean);
    renderHero(); renderCats(); render();
    route();
  } catch {
    document.getElementById("apps").innerHTML = `<div class="empty">Could not load catalog.</div>`;
  }
}
setLang(lang);
load();
</script>
